<script>
const roleRouteNonControls = "https://portal.drugreturns.com/customer/destructions";
const roleRouteControlSubstance = "https://portal.drugreturns.com/customer/controlSubstance";
const customerID = "13846";

function reports_click() {
const refNum = document.getElementById('ras').value;
const customerID = "13846";
const viewURL = `https://portal.drugreturns.com/customer/returnReport?customerID=${customerID}&refNum=${refNum}&pdf=true`;

if (refNum) {
   const url = `http://reporting.drugreturns.com/Report?ReportName=ReturnPacket&RefNum=${refNum}`;
   // const url = `https://reportsvc.drugreturns.com/home/returnreports?customerID=${customerID}&refNum=${refNum}&pdf=true`;
     window.open(url, '_blank');
} else {
   alert("Please select a Reference Number before viewing the report.");
}
}

function controls_click() {
const refNum = document.getElementById('ras').value;
const receipt = 1;

if (refNum) {
   const checkUrlBase = "https://portal.drugreturns.com/customer/checkDestructionRefnum";
   // const checkUrlBase = "https://portal.drugreturns.com/customer/podControls";
   // const viewUrl = `${roleRouteNonControls}?refNum=${refNum}&receipt=${receipt}`;
   const checkUrl = `${checkUrlBase}?refNum=${refNum}&receipt=${receipt}`;
   const viewUrl = `https://reporting.drugreturns.com/Report?ReportName=PackingListDestruction&RefNum=${refNum}&CTRLS=ALL`;

   fetch(checkUrl)
       .then(response => response.json())
       .then(data => {
           if (data.status === 'ok') {
               window.open(viewUrl, '_blank');
           } else {
               alert(data.error || 'Something went wrong.');
           }
       })
       .catch(error => {
           alert(error.message || 'Failed to check destruction status.');
       });

} else {
   alert("Please select a Reference Number before viewing the report.");
}
}

function non_controls() {
const refNum = document.getElementById('ras').value;
if (refNum) {
   const checkUrl = "https://portal.drugreturns.com/customer/checkDestructionRefnum"; 
   // const viewUrl = `${roleRouteNonControls}?refNum=${refNum}`; 
   const viewUrl = `https://reporting.drugreturns.com/Report?ReportName=PackingListDestruction&RefNum=${refNum}&CTRLS=NONE`;
   
   fetch(`${checkUrl}?refNum=${refNum}`)
       .then(response => response.json())
       .then(data => {
           if (data.status === 'ok') {
               window.open(viewUrl, '_blank');
           } else {
               alert(data.error || 'Something went wrong.');
           }
       })
       .catch(error => {
           alert(error.message || 'Failed to check destruction status.');
       });

} else {
   alert("Please select a Reference Number before viewing the report.");
}
}

function substance_click() {
const refNum = document.getElementById('ras').value;
if (refNum) {
   // const fileUrl = `${roleRouteControlSubstance}?refnum=${refNum}`;
  
   const fileUrl = `http://reporting.drugreturns.com/Report?ReportName=ControlledSubstance&RefNum=${refNum}`;
   window.open(fileUrl, '_blank');
} else {
   alert("Please select a Reference Number before viewing the report.");
}
}
