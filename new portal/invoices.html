<script>
window.addEventListener('DOMContentLoaded', function () {
const form = document.getElementById('payForm');
const payNowBtn = document.getElementById('payNowBtn');
const checkboxes = document.querySelectorAll('input[name="refnums[]"]');

if (!form || !payNowBtn) {
   console.warn('Form or Pay Now button not found in the DOM.');
   return;
}

function toggleButtonState() {
   const anyChecked = Array.from(checkboxes).some(checkbox => checkbox.checked);
   payNowBtn.disabled = !anyChecked;
}

checkboxes.forEach(checkbox => {
   checkbox.addEventListener('change', toggleButtonState);
});

form.addEventListener('submit', function (e) {
   const anyChecked = Array.from(checkboxes).some(checkbox => checkbox.checked);
   if (!anyChecked) {
       e.preventDefault();
       alert('Please select at least one invoice to proceed with payment.');
   }
});
});
</script>


<script>
document.getElementById('select-all').addEventListener('change', function () {
   let checkboxes = document.querySelectorAll('input[name="refnums[]"]');
   checkboxes.forEach(cb => cb.checked = this.checked);
});
</script>
