# Nixpacks configuration for Railway deployment
#
# Using @napi-rs/canvas instead of node-canvas means we no longer need:
# - cairo, pango, libpng, libjpeg, giflib, librsvg, pixman, libuuid, freetype, fontconfig
# - gcc, gnumake for compilation
# @napi-rs/canvas ships with prebuilt self-contained binaries for all platforms.

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium"
]

[phases.install]
cmds = ["npm install --legacy-peer-deps --include=dev"]

[phases.build]
cmds = ["npx tsc"]

[start]
cmd = "node dist/src/server.js"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/nix/store/chromium/bin/chromium"
NODE_ENV = "production"
